# Foot só para o tty-clock do dashboard — opaco + vermelho puro (sem rosa do schema/alpha).
shell=bash
title=pandora-clock
font=JetBrains Mono Nerd Font:size=12
dpi-aware=no
pad=0x0
bold-text-in-bright=no
gamma-correct-blending=no

[colors]
alpha=1.0
background=000000
foreground=ff0000
regular0=000000
regular1=ff0000
regular2=ff0000
regular3=ff0000
regular4=ff0000
regular5=ff0000
regular6=ff0000
regular7=ffffff
bright0=444444
bright1=ff0000
bright2=ff0000
bright3=ff0000
bright4=ff0000
bright5=ff0000
bright6=ff0000
bright7=ffffff
