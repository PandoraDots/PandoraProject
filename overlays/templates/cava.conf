# Pandora cava template — preferido por apply_cava quando presente.
# Cores vêm do schema Caelestia a cada `caelestia scheme set` / wallpaper.

[general]
framerate = 60
autosens = 1
bars = 32
bar_width = 1
bar_spacing = 1

[input]
method = pulse
source = auto

[output]
method = ncurses
style = stereo

[color]
# Fundo igual ao terminal (schema background / preto)
background = '{{ $background }}'
gradient = 1
gradient_count = 8
gradient_color_1 = '{{ $primaryContainer }}'
gradient_color_2 = '{{ $primaryDim }}'
gradient_color_3 = '{{ $primary }}'
gradient_color_4 = '{{ $secondary }}'
gradient_color_5 = '{{ $tertiary }}'
gradient_color_6 = '{{ $red }}'
gradient_color_7 = '{{ $maroon }}'
gradient_color_8 = '{{ $error }}'

[smoothing]
noise_reduction = 85
monstercat = 1
waves = 0
gravity = 120

[eq]
1 = 0.8
2 = 0.9
3 = 1.0
4 = 1.1
5 = 1.2
